<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Recenzje')}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Recenzje</h1>
        <a th:href="@{/admin}" class="btn btn-outline-secondary">Panel admina</a>
    </div>

    <div th:if="${#lists.isEmpty(reviews)}" class="alert alert-info">Brak recenzji.</div>

    <table class="table align-middle" th:if="${!#lists.isEmpty(reviews)}">
        <thead>
        <tr>
            <th>Film</th>
            <th>Użytkownik</th>
            <th>Treść</th>
            <th class="text-end">Akcje</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reviews}">
            <td>
                <a th:href="@{/movies/{id}(id=${r.movie.id})}" th:text="${r.movie.title}">Film</a>
            </td>
            <td th:text="${r.user.username}">user</td>
            <td th:text="${r.content}">Treść</td>
            <td class="text-end">
                <form th:action="@{/admin/reviews/{id}/delete(id=${r.id})}"
                      method="post"
                      onsubmit="return confirm('Usunąć tę recenzję?')">
                    <button class="btn btn-sm btn-outline-danger">Usuń</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
