<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{movies.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<header class="hero py-5 mb-4">
    <div class="container text-white">
        <h1 class="display-5 fw-bold">MovieBase</h1>
        <p class="lead">Mini baza filmów z ocenami, recenzjami i watchlistą.</p>
        <form class="row g-2" th:action="@{/movies}" method="get">
            <div class="col-md-10">
                <input class="form-control form-control-lg"
                       name="q"
                       th:value="${q}"
                       th:placeholder="#{movies.search}">
            </div>
            <div class="col-md-2">
                <button class="btn btn-warning btn-lg w-100" th:text="#{button.search}">Szukaj</button>
            </div>
        </form>
    </div>
</header>

<main class="container">
    <div th:if="${movies.empty}" class="alert alert-info" th:text="#{movies.noResults}">Brak filmów</div>
    <div class="row g-4">
        <div class="col-sm-6 col-md-4 col-lg-3" th:each="movie : ${movies.content}">
            <div class="card movie-card h-100 shadow-sm">
                <div class="poster"
                     th:style="${movie.posterPath != null}
                         ? 'background-image:url(' + ${movie.posterPath} + ')'
                         : ''"></div>
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${movie.title}">Tytuł</h5>
                    <p class="text-muted small"
                       th:text="${movie.releaseYear} + ' • ' + ${movie.durationMinutes} + ' min'">2026</p>
                    <p class="small text-truncate" th:text="${movie.description}">Opis</p>
                    <a class="btn btn-dark mt-auto"
                       th:href="@{/movies/{id}(id=${movie.id})}">Szczegóły</a>
                </div>
            </div>
        </div>
    </div>

    <nav class="mt-4" th:if="${movies.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${movies.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/movies(q=${q},page=${movies.number-1})}">«</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, movies.totalPages-1)}"
                th:classappend="${i == movies.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/movies(q=${q},page=${i})}"
                   th:text="${i+1}">1</a>
            </li>
            <li class="page-item" th:classappend="${movies.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/movies(q=${q},page=${movies.number+1})}">»</a>
            </li>
        </ul>
    </nav>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
