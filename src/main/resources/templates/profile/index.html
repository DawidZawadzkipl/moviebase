<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{nav.profile})}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="container py-4">
    <h1 th:text="#{profile.title}">Mój profil</h1>
    <p class="text-muted" th:text="${user.email}">email</p>

    <h2 class="h4 mt-4" th:text="#{profile.watchlist}">Moja watchlista</h2>
    <div th:if="${#lists.isEmpty(watchlist)}" class="alert alert-info" th:text="#{profile.watchlist.empty}">
        Nie masz jeszcze filmów na liście.
    </div>
    <table class="table align-middle" th:if="${!#lists.isEmpty(watchlist)}">
        <thead>
        <tr>
            <th>Film</th>
            <th>Status</th>
            <th class="text-end">Akcje</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${watchlist}">
            <td>
                <a th:href="@{/movies/{id}(id=${item.movie.id})}"
                   th:text="${item.movie.title}">Film</a>
            </td>
            <td>
                <form th:action="@{/profile/watchlist/{id}/status(id=${item.id})}"
                      method="post"
                      class="d-flex gap-2">
                    <select name="status" class="form-select form-select-sm" style="max-width: 180px;">
                        <option th:each="s : ${statuses}"
                                th:value="${s}"
                                th:text="${s}"
                                th:selected="${s == item.status}">
                        </option>
                    </select>
                    <button class="btn btn-sm btn-outline-primary">Zmień</button>
                </form>
            </td>
            <td class="text-end">
                <form th:action="@{/profile/watchlist/{id}/delete(id=${item.id})}"
                      method="post"
                      onsubmit="return confirm('Usunąć film z listy?')">
                    <button class="btn btn-sm btn-outline-danger">Usuń z listy</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <h2 class="h4 mt-4" th:text="#{profile.reviews}">Moje recenzje</h2>
    <div th:if="${#lists.isEmpty(reviews)}" class="alert alert-info" th:text="#{profile.reviews.empty}">
        Nie masz jeszcze recenzji.
    </div>
    <div class="card mb-2" th:each="r : ${reviews}">
        <div class="card-body">
            <div class="d-flex justify-content-between gap-3">
                <div>
                    <strong>
                        <a th:href="@{/movies/{id}(id=${r.movie.id})}"
                           th:text="${r.movie.title}">Film</a>
                    </strong>
                    <p class="mb-0" th:text="${r.content}">Treść recenzji</p>
                </div>
                <form th:action="@{/profile/reviews/{id}/delete(id=${r.id})}"
                      method="post"
                      onsubmit="return confirm('Usunąć recenzję?')">
                    <button class="btn btn-sm btn-outline-danger">Usuń</button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
