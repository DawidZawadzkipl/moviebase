<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.reviews})}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 th:text="#{admin.reviews}">Recenzje</h1>
        <a th:href="@{/admin}" class="btn btn-outline-secondary" th:text="#{admin.back}">Panel admina</a>
    </div>

    <div th:if="${#lists.isEmpty(reviews)}" class="alert alert-info" th:text="#{admin.reviews.empty}">Brak recenzji.</div>

    <table class="table align-middle" th:if="${!#lists.isEmpty(reviews)}">
        <thead>
        <tr>
            <th th:text="#{profile.table.movie}">Film</th>
            <th th:text="#{admin.table.user}">Uzytkownik</th>
            <th th:text="#{admin.table.content}">Tresc</th>
            <th class="text-end" th:text="#{admin.table.actions}">Akcje</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reviews}">
            <td>
                <a th:href="@{/movies/{id}(id=${r.movie.id})}" th:text="${r.movie.title}">Film</a>
            </td>
            <td th:text="${r.user.username}">user</td>
            <td th:text="${r.content}">Tresc</td>
            <td class="text-end">
                <form th:action="@{/admin/reviews/{id}/delete(id=${r.id})}"
                      method="post"
                      th:data-confirm="#{confirm.deleteReview}"
                      onsubmit="return confirm(this.dataset.confirm)">
                    <button class="btn btn-sm btn-outline-danger" th:text="#{button.delete}">Usun</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
