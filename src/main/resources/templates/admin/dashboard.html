<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{nav.admin})}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="container py-4">
    <div class="page-heading">
        <div>
            <p class="text-muted mb-1">MovieBase</p>
            <h1 class="mb-0" th:text="#{admin.title}">Panel administratora</h1>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-4">
            <div class="card admin-card">
                <div class="card-body">
                    <h2 th:text="#{admin.users}">Uzytkownicy</h2>
                    <p class="display-6" th:text="${users}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <a class="card admin-card text-decoration-none text-dark" th:href="@{/admin/movies}">
                <div class="card-body">
                    <h2 th:text="#{admin.movies.short}">Filmy</h2>
                    <p th:text="#{admin.movies.copy}">Zarzadzaj baza filmow</p>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a class="card admin-card text-decoration-none text-dark" th:href="@{/admin/genres}">
                <div class="card-body">
                    <h2 th:text="#{admin.genres}">Gatunki</h2>
                    <p><span th:text="${genres}">0</span> <span th:text="#{admin.genres.copy}">kategorii filmow</span></p>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a class="card admin-card text-decoration-none text-dark" th:href="@{/admin/reviews}">
                <div class="card-body">
                    <h2 th:text="#{admin.reviews}">Recenzje</h2>
                    <p th:text="#{admin.reviews.copy}">Moderuj i usuwaj recenzje</p>
                </div>
            </a>
        </div>
    </div>
</main>
</body>
</html>
