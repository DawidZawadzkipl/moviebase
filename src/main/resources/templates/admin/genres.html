<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.genres})}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center gap-3 mb-3">
        <div>
            <a th:href="@{/admin}" class="text-muted text-decoration-none" th:text="#{admin.back}">Panel admina</a>
            <h1 class="mb-0" th:text="#{admin.genres}">Gatunki</h1>
        </div>
        <a class="btn btn-warning" th:href="@{/admin/genres/new}" th:text="#{admin.genres.add}">Dodaj gatunek</a>
    </div>

    <div th:if="${#lists.isEmpty(genres)}" class="alert alert-info" th:text="#{admin.genres.empty}">Brak gatunkow.</div>

    <table class="table table-striped align-middle" th:if="${!#lists.isEmpty(genres)}">
        <thead>
        <tr>
            <th th:text="#{admin.table.namePl}">Nazwa PL</th>
            <th th:text="#{admin.table.nameEn}">Nazwa EN</th>
            <th class="text-end" th:text="#{admin.table.actions}">Akcje</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="genre : ${genres}">
            <td th:text="${genre.namePl}">Akcja</td>
            <td th:text="${genre.nameEn}">Action</td>
            <td class="text-end">
                <div class="d-inline-flex gap-2">
                    <a class="btn btn-sm btn-outline-dark"
                       th:href="@{/admin/genres/{id}/edit(id=${genre.id})}"
                       th:text="#{button.edit}">Edytuj</a>
                    <form th:action="@{/admin/genres/{id}/delete(id=${genre.id})}"
                          method="post"
                          th:data-confirm="#{confirm.deleteGenre}"
                          onsubmit="return confirm(this.dataset.confirm)">
                        <button class="btn btn-sm btn-outline-danger" th:text="#{button.delete}">Usun</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
