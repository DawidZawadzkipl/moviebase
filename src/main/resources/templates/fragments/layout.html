<!doctype html>
<html lang="pl"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title} + ' | MovieBase'">MovieBase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">MovieBase</a>
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="nav" class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/movies}" th:text="#{nav.movies}">Filmy</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin}" th:text="#{nav.admin}">Admin</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/profile}" th:text="#{nav.profile}">Profil</a>
                </li>
            </ul>
            <div class="d-flex gap-2 align-items-center">
                <a class="text-white-50 small" th:href="@{?lang=pl}">PL</a>
                <a class="text-white-50 small" th:href="@{?lang=en}">EN</a>
                <a sec:authorize="isAnonymous()"
                   class="btn btn-outline-light btn-sm"
                   th:href="@{/login}"
                   th:text="#{nav.login}">Login</a>
                <a sec:authorize="isAnonymous()"
                   class="btn btn-warning btn-sm"
                   th:href="@{/register}"
                   th:text="#{nav.register}">Register</a>
                <form sec:authorize="isAuthenticated()"
                      th:action="@{/logout}"
                      method="post"
                      class="m-0">
                    <button class="btn btn-outline-light btn-sm" th:text="#{nav.logout}">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>
<footer th:fragment="footer" class="py-4 mt-5 border-top text-center text-muted">
    MovieBase © 2026
</footer>
</body>
</html>
