<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{register.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="container auth-box py-5">
    <div class="card shadow">
        <div class="card-body p-4">
            <h1 class="h3 mb-3" th:text="#{register.title}">Rejestracja</h1>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <form th:action="@{/register}" th:object="${registerForm}" method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="#{register.username}">Nazwa uzytkownika</label>
                    <input class="form-control" th:field="*{username}">
                    <div class="text-danger small" th:errors="*{username}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{auth.email}">Email</label>
                    <input class="form-control" type="email" th:field="*{email}" required>
                    <div class="text-danger small" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{auth.password}">Haslo</label>
                    <input class="form-control" type="password" th:field="*{password}">
                    <div class="text-danger small" th:errors="*{password}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{register.confirmPassword}">Powtorz haslo</label>
                    <input class="form-control" type="password" th:field="*{confirmPassword}">
                    <div class="text-danger small" th:errors="*{confirmPassword}"></div>
                </div>
                <button class="btn btn-warning w-100" th:text="#{register.submit}">Utworz konto</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
