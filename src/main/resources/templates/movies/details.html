<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${movie.title})}"></head>
<body>
<div th:replace="~{fragments/layout :: nav}"></div>

<main class="container py-4">
    <a th:href="@{/movies}" class="btn btn-outline-secondary mb-3" th:text="#{button.back}">Wróć</a>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="poster poster-large shadow"
                 th:style="${movie.posterPath != null}
                     ? 'background-image:url(' + ${movie.posterPath} + ')'
                     : ''"></div>
        </div>
        <div class="col-md-8">
            <h1 th:text="${movie.title}">Tytuł</h1>
            <p class="text-muted" th:text="${movie.originalTitle}">Original</p>
            <p>
                <span class="badge text-bg-warning fs-6">
                    ★ <span th:text="${#numbers.formatDecimal(average,1,1)}">0.0</span>
                </span>
            </p>
            <p th:text="${movie.description}">Opis</p>
            <p>
                <strong>Rok:</strong>
                <span th:text="${movie.releaseYear}"></span>
                |
                <strong>Czas:</strong>
                <span th:text="${movie.durationMinutes}"></span> min
            </p>
            <div class="mb-3">
                <span class="badge text-bg-secondary me-1"
                      th:each="g : ${movie.genres}"
                      th:text="${g.namePl}">Gatunek</span>
            </div>

            <div sec:authorize="isAuthenticated()" class="card mb-3">
                <div class="card-body">
                    <form th:action="@{/movies/{id}/ratings(id=${movie.id})}"
                          method="post"
                          class="row g-2 align-items-end">
                        <div class="col-auto">
                            <label class="form-label">Twoja ocena</label>
                            <input type="number"
                                   name="value"
                                   min="1"
                                   max="10"
                                   class="form-control"
                                   value="8">
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-warning">Oceń</button>
                        </div>
                    </form>
                    <hr>
                    <form th:action="@{/movies/{id}/watchlist(id=${movie.id})}"
                          method="post"
                          class="row g-2 align-items-end">
                        <div class="col-auto">
                            <label class="form-label">Watchlista</label>
                            <select name="status" class="form-select">
                                <option th:each="s : ${statuses}"
                                        th:value="${s}"
                                        th:text="${s}"></option>
                            </select>
                        </div>
                        <div class="col-auto">
                            <button class="btn btn-outline-dark">Dodaj</button>
                        </div>
                    </form>
                </div>
            </div>

            <div sec:authorize="isAnonymous()" class="alert alert-info">
                Zaloguj się, aby ocenić film i dodać recenzję.
            </div>
        </div>
    </div>

    <section class="mt-5">
        <h2 th:text="#{movie.reviews}">Recenzje</h2>
        <form sec:authorize="isAuthenticated()"
              th:action="@{/movies/{id}/reviews(id=${movie.id})}"
              method="post"
              class="mb-4">
            <textarea class="form-control mb-2"
                      name="content"
                      minlength="20"
                      maxlength="2000"
                      rows="4"
                      placeholder="Napisz recenzję..."
                      required></textarea>
            <button class="btn btn-dark" th:text="#{movie.addReview}">Dodaj recenzję</button>
        </form>
        <div class="card mb-2" th:each="review : ${reviews}">
            <div class="card-body">
                <div class="d-flex justify-content-between gap-3">
                    <div>
                        <strong th:text="${review.user.username}">user</strong>
                        <p class="mb-0" th:text="${review.content}">Treść</p>
                    </div>
                    <form sec:authorize="isAuthenticated()"
                          th:if="${review.user.email == #authentication.name}"
                          th:action="@{/reviews/{id}/delete(id=${review.id})}"
                          method="post"
                          onsubmit="return confirm('Usunąć recenzję?')">
                        <button class="btn btn-sm btn-outline-danger">Usuń</button>
                    </form>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
